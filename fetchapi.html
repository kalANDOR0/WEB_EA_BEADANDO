<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch API - Web programozás-1 Előadás Házi feladat</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP&family=Playpen+Sans+Thai:wght@100..800&display=swap" rel="stylesheet">    
</head>
<body>
    

    <nav id="menu">
        <a href="index.html">Home</a>
        <a href="javascript.html">Javascript</a>
        <a href="./react-app/react.html">React</a>
        <a href="./react-spa/build/index.html">SPA</a>
        <a href="fetchapi.html">Fetch API</a>
        <a href="./react-axios/index.html">Axios</a>
        <a href="oojs.html">OOJS</a>
    </nav>

    <div id="content" style="margin-top: 50px; margin-bottom: 50px;">
        <h2>Fetch API CRUD - Szerelők kezelése</h2>
        
        <div id="uzenet" style="font-weight: bold; margin-bottom: 15px;"></div>

        <form id="szereloForm">
            <div>
                <label for="az">Azonosító (az):</label><br>
                <input type="number" id="az" required>
            </div>
            <div>
                <label for="nev">Név:</label><br>
                <input type="text" id="nev" required>
            </div>
            <div>
                <label for="kezdev">Kezdés éve:</label><br>
                <input type="number" id="kezdev" required min="1900" max="2099">
            </div>
            <div>
                <button type="submit" id="mentesGomb">Mentés</button>
                <button type="button" onclick="formTorles()">Mégse</button>
            </div>
        </form>

        <br>

        <table>
            <thead>
                <tr>
                    <th>Azonosító</th>
                    <th>Név</th>
                    <th>Kezdés éve</th>
                    <th>Műveletek</th>
                </tr>
            </thead>
            <tbody id="szereloTablaBody">
                </tbody>
        </table>
    </div>

    

    <script>
        const apiUrl = 'api.php';
        let isEditing = false;

        // Oldal betöltésekor lekérjük az adatokat
        document.addEventListener("DOMContentLoaded", () => {
            fetchSzerelok();
        });

        // --- READ: Adatok lekérése a szerverről ---
        async function fetchSzerelok() {
            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                renderTable(data);
            } catch (error) {
                mutatUzenet("Hiba az adatok betöltésekor!", "red");
            }
        }

        // --- Táblázat frissítése ---
        function renderTable(data) {
            const tbody = document.getElementById('szereloTablaBody');
            tbody.innerHTML = '';

            data.forEach(szerelo => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${szerelo.az}</td>
                    <td>${szerelo.nev}</td>
                    <td>${szerelo.kezdev}</td>
                    <td>
                        <button onclick="editSzerelo(${szerelo.az}, '${szerelo.nev}', ${szerelo.kezdev})">Szerkesztés</button>
                        <button onclick="deleteSzerelo(${szerelo.az})">Törlés</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // --- CREATE / UPDATE: Adatok küldése a szervernek ---
        document.getElementById('szereloForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Megakadályozzuk az oldal újratöltését

            const az = document.getElementById('az').value;
            const nev = document.getElementById('nev').value;
            const kezdev = document.getElementById('kezdev').value;

            const payload = { az: az, nev: nev, kezdev: kezdev };
            const method = isEditing ? 'PUT' : 'POST';

            try {
                const response = await fetch(apiUrl, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();

                if (result.status === 'sikeres') {
                    mutatUzenet(result.uzenet, "green");
                    formTorles();
                    fetchSzerelok(); // Táblázat újratöltése
                } else {
                    mutatUzenet("Hiba: " + result.uzenet, "red");
                }
            } catch (error) {
                mutatUzenet("Hálózati hiba történt!", "red");
            }
        });

        // --- Űrlap kitöltése módosításhoz ---
        function editSzerelo(az, nev, kezdev) {
            document.getElementById('az').value = az;
            document.getElementById('nev').value = nev;
            document.getElementById('kezdev').value = kezdev;
            
            // Azonosító írásvédetté tétele szerkesztéskor
            document.getElementById('az').readOnly = true; 
            
            isEditing = true;
            document.getElementById('mentesGomb').textContent = "Módosítás";
        }

        // --- DELETE: Adat törlése ---
        async function deleteSzerelo(az) {
            if (!confirm("Biztosan törölni szeretnéd a " + az + " azonosítójú szerelőt?")) return;

            try {
                const response = await fetch(apiUrl, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ az: az })
                });
                const result = await response.json();

                if (result.status === 'sikeres') {
                    mutatUzenet(result.uzenet, "green");
                    fetchSzerelok();
                } else {
                    mutatUzenet("Hiba a törlésnél!", "red");
                }
            } catch (error) {
                mutatUzenet("Hálózati hiba történt!", "red");
            }
        }

        // --- Segédfüggvények ---
        function formTorles() {
            document.getElementById('szereloForm').reset();
            document.getElementById('az').readOnly = false;
            isEditing = false;
            document.getElementById('mentesGomb').textContent = "Mentés";
        }

        function mutatUzenet(szoveg, szin) {
            const div = document.getElementById('uzenet');
            div.textContent = szoveg;
            div.style.color = szin;
            setTimeout(() => div.textContent = '', 3000);
        }
    </script>
</body>
</html>
